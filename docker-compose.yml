services:
  calculadoracdb.api:
    image: ${DOCKER_REGISTRY-}calculadoracdbapi
    build:
      context: .
      dockerfile: CalculadoraCdb.Api/
    ports:
    - "5000:8080"
    
  frontend:
    build:
      context: .
      dockerfile: frontend/
    container_name: cdb-frontend
    ports:
      - "4200:80"         # Acesso Ó aplicańŃo Angular
    networks:
      - cdb-network
    depends_on:
      api:
        condition: service_healthy


